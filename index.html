<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Bijbel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- HOME -->
    <section id="home-view" class="screen active">
      <button class="icon-circle home-account" id="open-settings" aria-label="Account en instellingen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </button>
      <div class="progress-chip" id="progress-chip" aria-label="Leesvoortgang">
        <span class="chip-icon" aria-hidden="true">📖</span>
        <span class="chip-pct" id="progress-chip-pct">0%</span>
        <span class="chip-dot" aria-hidden="true">·</span>
        <span class="chip-chapters" id="progress-chip-chapters">0 hfst.</span>
      </div>
      <header class="screen-header home-header">
        <h1 class="home-title">Bijbel</h1>
        <span class="home-sub">Herziene Statenvertaling</span>
      </header>
      <div class="home-body">
        <blockquote class="daily-verse" id="daily-verse">
          <p>—</p>
          <cite></cite>
        </blockquote>

        <div class="overall-progress" id="overall-progress">
          <div class="progress-label">
            <span>Mijn voortgang</span>
            <span id="overall-progress-text">0 / 1189 hfst.</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill" id="overall-progress-fill"></div>
          </div>
        </div>

        <button class="cta-btn cta-secondary hidden" id="continue-reading">
          <span class="cta-label">Verder lezen</span>
          <span class="cta-sub" id="continue-reading-where"></span>
        </button>
        <button class="cta-btn" id="open-categories">Boeken openen</button>
      </div>
    </section>

    <!-- SETTINGS / ACCOUNT -->
    <section id="settings-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-home" aria-label="Sluiten">✕</button>
        <h2 class="screen-title">Account &amp; instellingen</h2>
        <span aria-hidden="true"></span>
      </header>
      <div class="settings-body">
        <div class="settings-account-card">
          <div class="account-card-head">
            <div class="account-avatar" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            </div>
            <div class="account-card-text">
              <div class="account-card-title">Niet ingelogd</div>
              <div class="account-card-sub">Log in om je voortgang op te slaan en te synchroniseren tussen apparaten.</div>
            </div>
          </div>
          <button class="cta-btn account-login-btn" id="login-google" type="button">
            <svg class="google-icon" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            <span>Inloggen met Google</span>
          </button>
          <button class="link-btn account-register-btn" id="create-account" type="button">Maak een account aan</button>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">Ondersteuning</div>
          <button class="settings-row" id="open-help" type="button">
            <span>Hulp &amp; ondersteuning</span>
            <span class="row-sub">Veelgestelde vragen en contact</span>
          </button>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">Leesvoortgang</div>
          <button class="settings-row settings-row-danger" id="reset-progress" type="button">
            <span>Voortgang wissen</span>
            <span class="row-sub">Verwijdert al je gelezen en bezochte hoofdstukken</span>
          </button>
        </div>
      </div>
    </section>

    <!-- BOEKEN met 3 tabbladen (OT / Alle / NT) -->
    <section id="categories-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-home" aria-label="Sluiten">✕</button>
        <h2 class="screen-title">Boeken</h2>
        <button class="icon-circle" aria-label="Geschiedenis">⟲</button>
      </header>

      <div class="top-tabs" role="tablist">
        <button class="tab-btn" data-tab="OT" role="tab">Oude Testament</button>
        <button class="tab-btn active" data-tab="ALL" role="tab">Alle boeken</button>
        <button class="tab-btn" data-tab="NT" role="tab">Nieuwe Testament</button>
      </div>

      <div class="sort-toggle sort-toggle-top" role="tablist" aria-label="Volgorde">
        <button class="sort-btn active" data-sort="traditional" role="tab">Traditioneel</button>
        <button class="sort-btn" data-sort="alphabetical" role="tab">Alfabetisch</button>
      </div>

      <ul class="big-list" id="books-tab-list"></ul>

      <div class="sort-toggle sort-toggle-bottom" role="tablist" aria-label="Volgorde">
        <button class="sort-btn active" data-sort="traditional" role="tab">Traditioneel</button>
        <button class="sort-btn" data-sort="alphabetical" role="tab">Alfabetisch</button>
      </div>
    </section>

    <!-- CHAPTERS van een boek -->
    <section id="chapters-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-books" aria-label="Terug">✕</button>
        <h2 class="screen-title" id="chapters-title">—</h2>
        <button class="icon-circle" aria-label="Geschiedenis">⟲</button>
      </header>
      <div class="chapters-grid" id="chapters-grid"></div>
    </section>

    <!-- READER -->
    <section id="reader-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-chapters" aria-label="Terug">✕</button>
        <h2 class="screen-title" id="reader-title">—</h2>
        <button class="icon-circle" aria-label="Geschiedenis">⟲</button>
      </header>
      <article class="reader" id="reader-content"></article>
      <div class="reader-actions">
        <button class="mark-btn" id="mark-read-btn">Markeer als gelezen</button>
      </div>
      <nav class="reader-nav">
        <button class="nav-btn" id="prev-chapter">‹ Vorige</button>
        <button class="nav-btn" id="next-chapter">Volgende ›</button>
      </nav>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
