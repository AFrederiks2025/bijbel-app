<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Bijbel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- HOME -->
    <section id="home-view" class="screen active">
      <button class="icon-circle home-account" id="open-settings" aria-label="Account en instellingen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </button>
      <div class="progress-chip" id="progress-chip" aria-label="Leesvoortgang">
        <span class="chip-icon" aria-hidden="true">📖</span>
        <span class="chip-pct" id="progress-chip-pct">0%</span>
        <span class="chip-dot" aria-hidden="true">·</span>
        <span class="chip-chapters" id="progress-chip-chapters">0 hfst.</span>
      </div>
      <header class="screen-header home-header">
        <h1 class="home-title">Bijbel</h1>
        <span class="home-sub">Statenvertaling</span>
      </header>
      <div class="home-body">
        <blockquote class="daily-verse" id="daily-verse">
          <p>—</p>
          <cite></cite>
        </blockquote>

        <div class="overall-progress" id="overall-progress">
          <div class="progress-label">
            <span>Mijn voortgang</span>
            <span id="overall-progress-text">0 / 1189 hfst.</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill" id="overall-progress-fill"></div>
          </div>
        </div>

        <button class="cta-btn cta-secondary hidden" id="continue-reading">
          <span class="cta-label">Verder lezen</span>
          <span class="cta-sub" id="continue-reading-where"></span>
        </button>
        <button class="cta-btn" id="open-categories">Boeken openen</button>
      </div>
    </section>

    <!-- SETTINGS / ACCOUNT -->
    <section id="settings-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-home" aria-label="Sluiten">✕</button>
        <h2 class="screen-title">Account &amp; instellingen</h2>
        <span aria-hidden="true"></span>
      </header>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">Account</div>
          <div class="settings-row settings-row-static">
            <span>Niet ingelogd</span>
            <span class="row-sub">Inloggen volgt binnenkort</span>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">Leesvoortgang</div>
          <button class="settings-row settings-row-danger" id="reset-progress">
            <span>Voortgang wissen</span>
            <span class="row-sub">Verwijdert al je gelezen en bezochte hoofdstukken</span>
          </button>
        </div>
      </div>
    </section>

    <!-- BOEKEN met 3 tabbladen (OT / Alle / NT) -->
    <section id="categories-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-home" aria-label="Sluiten">✕</button>
        <h2 class="screen-title">Boeken</h2>
        <button class="icon-circle" aria-label="Geschiedenis">⟲</button>
      </header>

      <div class="top-tabs" role="tablist">
        <button class="tab-btn" data-tab="OT" role="tab">Oude Testament</button>
        <button class="tab-btn active" data-tab="ALL" role="tab">Alle boeken</button>
        <button class="tab-btn" data-tab="NT" role="tab">Nieuwe Testament</button>
      </div>

      <ul class="big-list" id="books-tab-list"></ul>
    </section>

    <!-- CHAPTERS van een boek -->
    <section id="chapters-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-books" aria-label="Terug">✕</button>
        <h2 class="screen-title" id="chapters-title">—</h2>
        <button class="icon-circle" aria-label="Geschiedenis">⟲</button>
      </header>
      <div class="chapters-grid" id="chapters-grid"></div>
    </section>

    <!-- READER -->
    <section id="reader-view" class="screen">
      <header class="screen-header">
        <button class="icon-circle" data-action="back-to-chapters" aria-label="Terug">✕</button>
        <h2 class="screen-title" id="reader-title">—</h2>
        <button class="icon-circle" aria-label="Geschiedenis">⟲</button>
      </header>
      <article class="reader" id="reader-content"></article>
      <div class="reader-actions">
        <button class="mark-btn" id="mark-read-btn">Markeer als gelezen</button>
      </div>
      <nav class="reader-nav">
        <button class="nav-btn" id="prev-chapter">‹ Vorige</button>
        <button class="nav-btn" id="next-chapter">Volgende ›</button>
      </nav>
    </section>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
